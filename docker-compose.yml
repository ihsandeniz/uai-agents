services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uai-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uai_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-uai}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # İlk init'te pgvector extension'ını otomatik kur (drizzle migrate'ten önce)
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uai"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uai-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  runtime:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    container_name: uai-runtime
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-uai}:${POSTGRES_PASSWORD:-uai_dev_2026}@postgres:5432/${POSTGRES_DB:-uai}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: uai-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
      NEXT_PUBLIC_RUNTIME_URL: http://runtime:3000
    depends_on:
      runtime:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: uai-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - runtime

volumes:
  pgdata:
  redisdata:
  prometheusdata:
